<!DOCTYPE html>
<html lang="en" ng-app="XpenseIQ" ng-controller="AppController">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XpenseIQ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ AUTH PAGES (no sidebar) ═══ -->
  <div ng-if="currentPath === '/login' || currentPath === '/register'">
    <div ng-view></div>
  </div>

  <!-- ═══ APP SHELL (sidebar + topbar) ═══ -->
  <div class="app-layout" ng-if="currentPath !== '/login' && currentPath !== '/register' && isLoggedIn">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" ng-class="{open: sidebarOpen}" ng-click="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" ng-class="{open: sidebarOpen}">
      <div class="sidebar-logo">
        <div class="logo-icon">💸</div>
        <div class="logo-text">Xpense<span>IQ</span></div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Menu</div>

        <a class="nav-link" ng-class="{active: isActive('/dashboard')}" ng-click="go('/dashboard')">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a class="nav-link" ng-class="{active: isActive('/add-expense')}" ng-click="go('/add-expense')">
          <span class="nav-icon">➕</span> Add Expense
        </a>
        <a class="nav-link" ng-class="{active: isActive('/history')}" ng-click="go('/history')">
          <span class="nav-icon">📋</span> History
        </a>
        <a class="nav-link" ng-class="{active: isActive('/reports')}" ng-click="go('/reports')">
          <span class="nav-icon">📈</span> Reports
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="user-chip">
          <div class="user-avatar">{{ currentUser.name.charAt(0).toUpperCase() }}</div>
          <div>
            <div class="user-name">{{ currentUser.name }}</div>
            <div class="user-email">{{ currentUser.email }}</div>
          </div>
        </div>
        <a class="nav-link" ng-click="logout()" style="color:var(--danger);">
          <span class="nav-icon">🚪</span> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

      <!-- Mobile Header -->
      <div class="mobile-header">
        <button class="btn btn-secondary btn-sm" ng-click="toggleSidebar()">☰</button>
        <strong>Xpense<span style="color:var(--accent)">IQ</span></strong>
        <button class="dark-toggle" ng-click="toggleTheme()" style="padding:6px 10px;">
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </button>
      </div>

      <!-- Topbar -->
      <div class="topbar">
        <div>
          <div class="topbar-title">{{ pageTitle }}</div>
          <div class="topbar-subtitle">{{ pageSubtitle }}</div>
        </div>
        <div class="topbar-actions">
          <button class="dark-toggle" ng-click="toggleTheme()">
            <div class="toggle-track"><div class="toggle-thumb"></div></div>
            <span>{{ theme === 'dark' ? 'Light' : 'Dark' }}</span>
          </button>
          <button class="btn btn-primary btn-sm" ng-click="go('/add-expense')">+ Add</button>
        </div>
      </div>

      <!-- Page Content -->
      <div ng-view style="flex:1;"></div>

    </div>
  </div>

  <!-- Fallback for redirect -->
  <div ng-if="!isLoggedIn && currentPath !== '/login' && currentPath !== '/register'">
    <div ng-view></div>
  </div>

  <!-- Scripts -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/services.js"></script>
  <script src="js/controllers.js"></script>
</body>
</html>
