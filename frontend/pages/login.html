<!-- pages/login.html -->
<div class="auth-page">

  <button class="dark-toggle auth-theme-btn" ng-click="toggleTheme()" style="border:none;">
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span>{{ theme === 'dark' ? 'Light' : 'Dark' }}</span>
  </button>

  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-icon" style="width:48px;height:48px;font-size:22px;border-radius:14px;margin:0 auto 10px;">💸</div>
      <h1>Xpense<span>IQ</span></h1>
      <p>Smart expense tracking for smarter spending</p>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" ng-model="data.email"
               placeholder="you@example.com" ng-keyup="$event.keyCode === 13 && login()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" ng-model="data.password"
               placeholder="Enter password" ng-keyup="$event.keyCode === 13 && login()">
      </div>

      <div class="msg" ng-class="msgType" ng-show="message">{{ message }}</div>

      <button class="btn btn-primary btn-full" ng-click="login()" ng-disabled="loading">
        <span ng-if="!loading">Sign In →</span>
        <span ng-if="loading" class="spinner"></span>
      </button>
    </div>

    <div class="auth-switch">
      Don't have an account? <a href="#!/register">Create one</a>
    </div>
  </div>
</div>
